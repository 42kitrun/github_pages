const LV={
  beginner:{bg:'var(--color-background-info)',cl:'var(--color-text-info)'},
  intermediate:{bg:'var(--color-background-warning)',cl:'var(--color-text-warning)'},
  advanced:{bg:'var(--color-background-danger)',cl:'var(--color-text-danger)'}
};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function colorTree(tree){
  return tree.split('\n').map(line=>{
    if(!line.trim())return '';
    const ai=line.indexOf('←');
    const main=ai>=0?line.slice(0,ai):line;
    const comment=ai>=0?line.slice(ai):'';
    const bm=main.match(/^([│├└─\s]*)/);
    const pfx=bm?bm[1]:'';
    const rest=main.slice(pfx.length);
    const isDir=rest.trim().endsWith('/');
    const p=pfx?`<span style="color:var(--color-text-tertiary)">${esc(pfx)}</span>`:'';
    const r=rest?`<span style="${isDir?'color:var(--color-text-info);font-weight:500':'color:var(--color-text-secondary)'}">${esc(rest)}</span>`:'';
    const c=comment?`<span style="color:var(--color-text-tertiary);font-style:italic">${esc(comment)}</span>`:'';
    return `${p}${r}${c}`;
  }).join('\n');
}

function show(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  document.querySelectorAll('.apb').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const lv=LV[p.lv];
  document.getElementById('adetail').innerHTML=`
<div class="ach">
  <span class="act">${p.name}</span>
  <span class="acb" style="background:${lv.bg};color:${lv.cl}">${p.tag}</span>
</div>
<div class="ace">${p.en}</div>
<div class="acd">${p.desc}</div>
<div class="acw"><span style="font-weight:500;color:var(--color-text-primary)">언제 사용?</span>&nbsp; ${p.when}</div>
<div class="tree">${colorTree(p.tree)}</div>
<div class="pc">
  <div class="pcb">
    <div class="pch" style="color:var(--color-text-success)">장점</div>
    ${p.pros.map(x=>`<div class="pci">• ${x}</div>`).join('')}
  </div>
  <div class="pcb">
    <div class="pch" style="color:var(--color-text-danger)">단점 / 주의</div>
    ${p.cons.map(x=>`<div class="pci">• ${x}</div>`).join('')}
  </div>
</div>`;
}

const list=document.getElementById('alist');
P.forEach(p=>{
  const lv=LV[p.lv];
  const b=document.createElement('button');
  b.className='apb';b.dataset.id=p.id;
  b.innerHTML=`<span class="apbn">${p.name}</span><span class="apbe">${p.en}</span><span class="apbt" style="background:${lv.bg};color:${lv.cl}">${p.tag}</span>`;
  b.onclick=()=>show(p.id);
  list.appendChild(b);
});
show('layered');
</script>
